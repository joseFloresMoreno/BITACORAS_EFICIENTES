<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Móviles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container-main {
            max-width: 1000px;
            margin-top: 30px;
        }
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .btn-success, .btn-warning, .btn-danger {
            border-radius: 5px;
        }
        .table {
            font-size: 14px;
        }
        .alert {
            border-radius: 10px;
            border: none;
        }

        /* Mejora de visualización en móvil */
        @media (max-width: 768px) {
            .table {
                font-size: 12px;
            }
            
            .btn-acciones {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            
            .btn-acciones .btn {
                font-size: 13px;
                padding: 8px 10px;
                margin: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/menu/index.html">🚗 Bitácoras de Viajes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/clientes/index.html">🏢 Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/rutas/index.html">🚗 Rutas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="">🚙 Móviles</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container container-main">
        <div class="row mb-4">
            <div class="col-md-12">
                <h1 class="mb-3">Administración de Móviles</h1>
            </div>
        </div>

        <div id="alertas"></div>

        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">➕ Agregar Nuevo Móvil</h5>
            </div>
            <div class="card-body">
                <form id="formMovil">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="patente" class="form-label">Patente</label>
                            <input type="text" class="form-control" id="patente" placeholder="ABCD-12" required>
                            <small class="form-text text-muted">Identificador único del vehículo</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="nombre_movil" class="form-label">Nombre del Móvil</label>
                            <input type="text" class="form-control" id="nombre_movil" placeholder="Ej: Móvil 1" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="conductor" class="form-label">Conductor</label>
                            <input type="text" class="form-control" id="conductor" placeholder="Nombre del conductor">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="telefono" class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" id="telefono" placeholder="+56 9 1234 5678">
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg" id="btnSubmit">Agregar Móvil</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">Lista de Móviles</h5>
            </div>
            <div class="card-body">
                <div id="listadoMoviles" class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Patente</th>
                                <th>Nombre Móvil</th>
                                <th>Conductor</th>
                                <th>Teléfono</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-moviles">
                            <tr>
                                <td colspan="6" class="text-center text-muted">Cargando móviles...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.origin + '/api';
        let movilEnEdicion = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await cargarMoviles();
            document.getElementById('formMovil').addEventListener('submit', guardarMovil);
        });

        async function cargarMoviles() {
            try {
                const response = await fetch(`${API_URL}/moviles`);
                const moviles = await response.json();
                
                const tbody = document.getElementById('tbody-moviles');
                tbody.innerHTML = '';

                if (!Array.isArray(moviles) || moviles.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No hay móviles registrados</td></tr>';
                    return;
                }

                moviles.forEach(movil => {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${movil.numero}</strong></td>
                            <td>${movil.nombre_movil || '-'}</td>
                            <td>${movil.conductor || '-'}</td>
                            <td>${movil.telefono || '-'}</td>
                            <td>${movil.activo ? '<span class="badge bg-success">Activo</span>' : '<span class="badge bg-danger">Inactivo</span>'}</td>
                            <td class="btn-acciones-cell">
                                <div class="btn-acciones">
                                    <button class="btn btn-sm btn-warning" data-bs-toggle="tooltip" data-bs-title="Editar información del móvil" onclick="editarMovil(${movil.id})">✏️ Editar</button>
                                    <button class="btn btn-sm btn-danger" data-bs-toggle="tooltip" data-bs-title="Eliminar móvil permanentemente" onclick="eliminarMovil(${movil.id})">🗑️ Eliminar</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                mostrarAlerta('Error al cargar móviles: ' + error.message, 'danger');
            }

            // Inicializar tooltips después de cargar la tabla
            inicializarTooltips();
        }

        async function editarMovil(id) {
            try {
                const response = await fetch(`${API_URL}/moviles/${id}`);
                const movil = await response.json();
                
                movilEnEdicion = id;
                document.getElementById('patente').value = movil.numero;
                document.getElementById('nombre_movil').value = movil.nombre_movil || '';
                document.getElementById('conductor').value = movil.conductor || '';
                document.getElementById('telefono').value = movil.telefono || '';
                
                document.getElementById('patente').disabled = true;
                document.getElementById('btnSubmit').textContent = 'Actualizar Móvil';
                document.querySelector('.card-header h5').textContent = '✏️ Editar Móvil';
                
                document.querySelector('.card-header').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                mostrarAlerta('Error al cargar móvil: ' + error.message, 'danger');
            }
        }

        async function guardarMovil(e) {
            e.preventDefault();

            const patente = document.getElementById('patente').value;
            const nombre_movil = document.getElementById('nombre_movil').value;
            const conductor = document.getElementById('conductor').value;
            const telefono = document.getElementById('telefono').value;

            if (!patente || !nombre_movil) {
                mostrarAlerta('Patente y nombre de móvil son requeridos', 'danger');
                return;
            }

            try {
                let response;
                if (movilEnEdicion) {
                    response = await fetch(`${API_URL}/moviles/${movilEnEdicion}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nombre_movil, conductor, telefono })
                    });
                } else {
                    response = await fetch(`${API_URL}/moviles`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ numero: patente, nombre_movil, conductor, telefono })
                    });
                }

                const data = await response.json();

                if (response.ok) {
                    mostrarAlerta(movilEnEdicion ? 'Móvil actualizado exitosamente' : 'Móvil agregado exitosamente', 'success');
                    resetearFormulario();
                    cargarMoviles();
                } else {
                    mostrarAlerta('Error: ' + (data.error || 'No se pudo guardar el móvil'), 'danger');
                }
            } catch (error) {
                mostrarAlerta('Error: ' + error.message, 'danger');
            }
        }

        function resetearFormulario() {
            movilEnEdicion = null;
            document.getElementById('formMovil').reset();
            document.getElementById('patente').disabled = false;
            document.getElementById('btnSubmit').textContent = 'Agregar Móvil';
            document.querySelector('.card-header h5').textContent = '➕ Agregar Nuevo Móvil';
        }

        function inicializarTooltips() {
            const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });
        }

        function mostrarAlerta(mensaje, tipo) {
            const alertas = document.getElementById('alertas');
            alertas.innerHTML = `<div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
                ${mensaje}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
            setTimeout(() => { alertas.innerHTML = ''; }, 5000);
        }

        async function eliminarMovil(id) {
            if (!confirm('¿Estás seguro?')) return;

            try {
                const response = await fetch(`${API_URL}/moviles/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    mostrarAlerta('Móvil eliminado exitosamente', 'success');
                    cargarMoviles();
                } else {
                    mostrarAlerta('Error al eliminar móvil', 'danger');
                }
            } catch (error) {
                mostrarAlerta('Error: ' + error.message, 'danger');
            }
        }
    </script>
</body>
</html>
