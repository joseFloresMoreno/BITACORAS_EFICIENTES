<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container-main {
            max-width: 1000px;
            margin-top: 30px;
        }
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .btn-success, .btn-warning, .btn-danger {
            border-radius: 5px;
        }
        .table {
            font-size: 14px;
        }
        .alert {
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/menu/index.html">📍 Bitácoras de Viajes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="">👥 Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/clientes/index.html">🏢 Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/rutas/index.html">🚗 Rutas</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container container-main">
        <div class="row mb-4">
            <div class="col-md-12">
                <h1 class="mb-3">Administración de Usuarios</h1>
            </div>
        </div>

        <div id="alertas"></div>

        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Crear Nuevo Usuario</h5>
            </div>
            <div class="card-body">
                <form id="formUsuario">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="rut" class="form-label">RUT Chileno</label>
                            <input type="text" class="form-control" id="rut" placeholder="11222333-4" required>
                            <small class="form-text text-muted">Formato: XXXXXXXX-X</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Juan Pérez" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="juan@example.com" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="contraseña" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="contraseña" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="rol" class="form-label">Rol</label>
                            <select class="form-select" id="rol">
                                <option value="usuario">Usuario</option>
                                <option value="administrador">Administrador</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg" id="btnSubmit">Crear Usuario</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">Lista de Usuarios</h5>
            </div>
            <div class="card-body">
                <div id="listadoUsuarios" class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>RUT</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Creado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-usuarios">
                            <tr>
                                <td colspan="6" class="text-center text-muted">Cargando usuarios...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.origin + '/api';
        let usuarioEnEdicion = null;

        // Funciones para validar RUT chileno
        function validarRUT(rut) {
            if (!rut) return false;
            rut = rut.toString().toUpperCase().replace(/\s/g, '').replace(/\./g, '').replace(/-/g, '');
            if (!/^\d{7,8}[0-9K]$/.test(rut)) return false;
            
            const rutNumeros = rut.slice(0, -1);
            const digitoVerificador = rut.slice(-1);
            let suma = 0;
            let multiplicador = 2;
            
            for (let i = rutNumeros.length - 1; i >= 0; i--) {
                suma += parseInt(rutNumeros[i]) * multiplicador;
                multiplicador++;
                if (multiplicador > 7) multiplicador = 2;
            }
            
            const residuo = 11 - (suma % 11);
            let digitoCalculado;
            if (residuo === 11) digitoCalculado = '0';
            else if (residuo === 10) digitoCalculado = 'K';
            else digitoCalculado = residuo.toString();
            
            return digitoVerificador === digitoCalculado;
        }

        function formatearRUT(rut) {
            if (!rut) return '';
            rut = rut.toString().toUpperCase().replace(/\s/g, '').replace(/\./g, '').replace(/-/g, '');
            if (rut.length < 2) return rut;
            
            const rutNumeros = rut.slice(0, -1);
            const digitoVerificador = rut.slice(-1);
            return `${rutNumeros}-${digitoVerificador}`;
        }

        // Cargar usuarios al abrir la página
        document.addEventListener('DOMContentLoaded', () => {
            cargarUsuarios();
            document.getElementById('formUsuario').addEventListener('submit', guardarUsuario);
            document.getElementById('rut').addEventListener('blur', (e) => {
                if (e.target.value && validarRUT(e.target.value)) {
                    e.target.value = formatearRUT(e.target.value);
                } else if (e.target.value) {
                    mostrarAlerta('RUT inválido', 'warning');
                }
            });
        });

        async function cargarUsuarios() {
            try {
                const response = await fetch(`${API_URL}/usuarios`);
                const usuarios = await response.json();
                
                const tbody = document.getElementById('tbody-usuarios');
                tbody.innerHTML = '';

                // Validar que sea un array
                if (!Array.isArray(usuarios)) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Error al cargar usuarios</td></tr>';
                    return;
                }

                if (usuarios.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No hay usuarios registrados</td></tr>';
                    return;
                }

                usuarios.forEach(usuario => {
                    const fecha = new Date(usuario.creado_en).toLocaleDateString('es-ES');
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${usuario.rut}</strong></td>
                            <td>${usuario.nombre}</td>
                            <td>${usuario.email}</td>
                            <td><span class="badge bg-secondary">${usuario.rol}</span></td>
                            <td>${fecha}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="editarUsuario('${usuario.rut}')">Editar</button>
                                <button class="btn btn-sm btn-danger" onclick="eliminarUsuario('${usuario.rut}')">Eliminar</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                mostrarAlerta('Error al cargar usuarios: ' + error.message, 'danger');
            }
        }

        async function editarUsuario(rut) {
            try {
                const response = await fetch(`${API_URL}/usuarios/${rut}`);
                const usuario = await response.json();
                
                usuarioEnEdicion = rut;
                document.getElementById('rut').value = usuario.rut;
                document.getElementById('nombre').value = usuario.nombre;
                document.getElementById('email').value = usuario.email;
                document.getElementById('rol').value = usuario.rol;
                document.getElementById('contraseña').value = '';
                document.getElementById('rut').disabled = true;
                document.getElementById('contraseña').required = false;
                document.getElementById('btnSubmit').textContent = 'Actualizar Usuario';
                document.querySelector('.card-header h5').textContent = 'Editar Usuario';
                
                // Scroll al formulario
                document.querySelector('.card-header').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                mostrarAlerta('Error al cargar usuario: ' + error.message, 'danger');
            }
        }

        async function guardarUsuario(e) {
            e.preventDefault();

            let rut = document.getElementById('rut').value;
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const contraseña = document.getElementById('contraseña').value;
            const rol = document.getElementById('rol').value;

            if (!usuarioEnEdicion && !validarRUT(rut)) {
                mostrarAlerta('RUT inválido', 'danger');
                return;
            }

            // Formatear RUT al enviar
            rut = formatearRUT(rut);

            try {
                let response;
                if (usuarioEnEdicion) {
                    // Actualizar usuario
                    response = await fetch(`${API_URL}/usuarios/${usuarioEnEdicion}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nombre, email, rol })
                    });
                } else {
                    // Crear usuario
                    if (!contraseña) {
                        mostrarAlerta('Contraseña es requerida', 'danger');
                        return;
                    }
                    response = await fetch(`${API_URL}/usuarios`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ rut, nombre, email, contraseña, rol })
                    });
                }

                const data = await response.json();

                if (response.ok) {
                    mostrarAlerta(usuarioEnEdicion ? 'Usuario actualizado exitosamente' : 'Usuario creado exitosamente', 'success');
                    resetearFormulario();
                    cargarUsuarios();
                } else {
                    mostrarAlerta('Error: ' + (data.error || 'No se pudo guardar el usuario'), 'danger');
                }
            } catch (error) {
                mostrarAlerta('Error: ' + error.message, 'danger');
            }
        }

        function resetearFormulario() {
            usuarioEnEdicion = null;
            document.getElementById('formUsuario').reset();
            document.getElementById('rut').disabled = false;
            document.getElementById('contraseña').required = true;
            document.getElementById('btnSubmit').textContent = 'Crear Usuario';
            document.querySelector('.card-header h5').textContent = 'Crear Nuevo Usuario';
        }

        function mostrarAlerta(mensaje, tipo) {
            const alertas = document.getElementById('alertas');
            alertas.innerHTML = `<div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
                ${mensaje}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
            setTimeout(() => {
                alertas.innerHTML = '';
            }, 5000);
        }

        async function eliminarUsuario(rut) {
            if (!confirm('¿Estás seguro de que deseas eliminar este usuario?')) return;

            try {
                const response = await fetch(`${API_URL}/usuarios/${rut}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    mostrarAlerta('Usuario eliminado exitosamente', 'success');
                    cargarUsuarios();
                } else {
                    mostrarAlerta('Error al eliminar usuario', 'danger');
                }
            } catch (error) {
                mostrarAlerta('Error: ' + error.message, 'danger');
            }
        }
    </script>
</body>
</html>
