<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácoras de Viajes Eficientes - Menú Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .menu-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 700px;
            width: 100%;
        }
        .menu-container h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
        }
        .menu-container p {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        .btn-menu {
            display: block;
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .btn-menu:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
            text-decoration: none;
        }
        .btn-menu i {
            margin-right: 10px;
        }
        .icon {
            display: inline-block;
            width: 100px;
            height: 100px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div class="icon">📍</div>
        <h1>Bitácoras de Viajes Eficientes</h1>
        <p>Gestiona tus rutas de distribución de forma inteligente y optimizada</p>
        
        <a href="/clientes/index.html" class="btn-menu">
            🏢 Administración de Clientes
        </a>
        <a href="/rutas/index.html" class="btn-menu">
            🚗 Crear y Gestionar Rutas
        </a>
        <button class="btn-menu" data-bs-toggle="modal" data-bs-target="#modalGeocoding" style="background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);">
            🔧 [Dev] Geocodificación Inversa
        </button>
    </div>

    <!-- Modal de Geocodificación Inversa (DEV) -->
    <div class="modal fade" id="modalGeocoding" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title">🔧 Herramienta Dev - Geocodificación Inversa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted"><small>Convierte coordenadas en dirección (OpenStreetMap)</small></p>
                    
                    <div class="mb-3">
                        <label class="form-label"><strong>Latitud</strong></label>
                        <input type="number" class="form-control" id="inputLatitud" placeholder="Cargando desde .env..." step="0.000001">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label"><strong>Longitud</strong></label>
                        <input type="number" class="form-control" id="inputLongitud" placeholder="Cargando desde .env..." step="0.000001">
                    </div>

                    <div id="resultadoGeocoding"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-info" onclick="obtenerDireccion()">🔍 Obtener Dirección</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:5000/api';

        // Cargar coordenadas del .env cuando se abre el modal
        const modalGeocoding = document.getElementById('modalGeocoding');
        if (modalGeocoding) {
            modalGeocoding.addEventListener('show.bs.modal', async () => {
                try {
                    const response = await fetch(`${API_URL}/dev/config`);
                    const data = await response.json();
                    document.getElementById('inputLatitud').value = data.punto_inicio.latitud;
                    document.getElementById('inputLongitud').value = data.punto_inicio.longitud;
                } catch (error) {
                    console.error('Error al cargar config:', error);
                }
            });
        }

        async function obtenerDireccion() {
            const latitud = document.getElementById('inputLatitud').value;
            const longitud = document.getElementById('inputLongitud').value;
            const resultadoDiv = document.getElementById('resultadoGeocoding');

            if (!latitud || !longitud) {
                resultadoDiv.innerHTML = '<div class="alert alert-warning"><strong>⚠️</strong> Ingresa latitud y longitud</div>';
                return;
            }

            resultadoDiv.innerHTML = '<div class="alert alert-info"><strong>⏳</strong> Obteniendo dirección desde OpenStreetMap...</div>';

            try {
                const response = await fetch(`${API_URL}/dev/geocoding-inverso?lat=${latitud}&lon=${longitud}`);
                const data = await response.json();

                if (data.success) {
                    resultadoDiv.innerHTML = `
                        <div class="alert alert-success">
                            <h6>✅ Dirección Encontrada</h6>
                            <p class="mb-1"><strong>Coordenadas:</strong> ${latitud}, ${longitud}</p>
                            <p class="mb-0"><strong>Dirección:</strong> ${data.direccion}</p>
                        </div>
                    `;
                } else {
                    resultadoDiv.innerHTML = `
                        <div class="alert alert-warning">
                            <h6>⚠️ No se encontró dirección</h6>
                            <p class="mb-0">${data.mensaje || 'Intenta con coordenadas diferentes'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultadoDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <h6>❌ Error</h6>
                        <p class="mb-0">${error.message}</p>
                    </div>
                `;
            }
        }

        // Permitir Enter en los inputs
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('inputLatitud')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') obtenerDireccion();
            });
            document.getElementById('inputLongitud')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') obtenerDireccion();
            });
        });
    </script>
</body>
</html>
