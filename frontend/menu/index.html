<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácoras de Viajes Eficientes - Menú Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .menu-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 700px;
            width: 100%;
        }
        .menu-container h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
        }
        .menu-container p {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        .btn-menu {
            display: block;
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .btn-menu:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
            text-decoration: none;
        }
        .btn-menu i {
            margin-right: 10px;
        }
        .icon {
            display: inline-block;
            width: 100px;
            height: 100px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div class="icon">📍</div>
        <h1>Bitácoras de Viajes Eficientes</h1>
        <p>Gestiona tus rutas de distribución de forma inteligente y optimizada</p>
        
        <a href="/clientes/index.html" class="btn-menu">
            🏢 Administración de Clientes
        </a>
        <a href="/rutas/index.html" class="btn-menu">
            🚗 Crear y Gestionar Rutas
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
